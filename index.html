<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAS IQ</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  .redirect-box{ text-align:center; padding:80px 20px; }
  .redirect-box .icon{ font-size:34px; margin-bottom:14px; }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <main>
    <div class="redirect-box">
      <div class="icon">⏳</div>
      <h3 style="font-family:var(--font-display);">One sec...</h3>
    </div>
  </main>
  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    sb.auth.getSession().then(({ data }) => {
      window.location.href = data.session ? 'select-quiz.html' : 'login.html';
    });
  </script>
</body>
</html>
