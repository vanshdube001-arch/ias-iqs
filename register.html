<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAS IQ — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="theme-toggle" role="group" aria-label="Study hour theme">
    <button id="btn-dawn" class="active" onclick="setTheme('dawn')">☀ EARLY RISER</button>
    <button id="btn-dusk" onclick="setTheme('dusk')">☾ NIGHT OWL</button>
  </div>

  <header>
    <div class="eyebrow">IAS IQ · Daily Practice · Sourced from The Hindu</div>
    <h1>Create your account</h1>
    <div class="date" id="todayDate"></div>
  </header>

  <main>
    <div class="face" style="max-width:420px; margin:0 auto;">
      <div id="errorMsg" class="error-msg"></div>

      <form id="signupForm">
        <div class="field">
          <label>Display name</label>
          <input type="text" id="signupName" required autocomplete="name" placeholder="Your name">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn-primary" id="signupBtn">Create account</button>
        <div class="switch-row">Already have an account? <a href="login.html">Log in</a></div>
      </form>
    </div>
  </main>

  <footer>New question set drops daily at 6 AM.</footer>
  <div class="toast" id="toast"></div>

  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    function setTheme(name){
      if (name === 'dusk') document.body.setAttribute('data-theme', 'dusk');
      else document.body.removeAttribute('data-theme');
      document.getElementById('btn-dawn').classList.toggle('active', name === 'dawn');
      document.getElementById('btn-dusk').classList.toggle('active', name === 'dusk');
      localStorage.setItem('iasiq-theme', name);
    }
    (function(){ const saved = localStorage.getItem('iasiq-theme'); if (saved) setTheme(saved); })();

    function showError(msg){
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearError(){ document.getElementById('errorMsg').classList.remove('show'); }

    // If already logged in, skip straight to quiz
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'select-quiz.html';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { display_name: name } }
      });
      btn.disabled = false; btn.textContent = 'Create account';
      if (error){ showError(error.message); return; }
      if (data.session){
        window.location.href = 'select-quiz.html';
      } else {
        showError('Account created! Check your email to confirm, then log in.');
        setTimeout(() => { window.location.href = 'login.html'; }, 1800);
      }
    });
  </script>
</body>
</html>
