<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAS IQ — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="theme-toggle" role="group" aria-label="Study hour theme">
    <button id="btn-dawn" class="active" onclick="setTheme('dawn')">☀ EARLY RISER</button>
    <button id="btn-dusk" onclick="setTheme('dusk')">☾ NIGHT OWL</button>
  </div>

  <header>
    <div class="eyebrow">IAS IQ · Daily Practice · Sourced from The Hindu</div>
    <h1>Welcome back</h1>
    <div class="date" id="todayDate"></div>
  </header>

  <main>
    <div class="face" style="max-width:420px; margin:0 auto;">
      <div id="errorMsg" class="error-msg"></div>

      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Log in</button>
        <div class="switch-row">New here? <a href="register.html">Create an account</a></div>
      </form>
    </div>
  </main>

  <footer>New question set drops daily at 6 AM.</footer>
  <div class="toast" id="toast"></div>

  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    function setTheme(name){
      if (name === 'dusk') document.body.setAttribute('data-theme', 'dusk');
      else document.body.removeAttribute('data-theme');
      document.getElementById('btn-dawn').classList.toggle('active', name === 'dawn');
      document.getElementById('btn-dusk').classList.toggle('active', name === 'dusk');
      localStorage.setItem('iasiq-theme', name);
    }
    (function(){ const saved = localStorage.getItem('iasiq-theme'); if (saved) setTheme(saved); })();

    function showError(msg){
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearError(){ document.getElementById('errorMsg').classList.remove('show'); }

    // If already logged in, skip straight to quiz
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'select-quiz.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = 'Log in';
      if (error){ showError(error.message); return; }
      window.location.href = 'select-quiz.html';
    });
  </script>
</body>
</html>
