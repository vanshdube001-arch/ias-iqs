<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAS IQ — Choose a Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  .quiz-item{
    background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:18px 20px;
    margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  }
  .quiz-item .qi-left{ display:flex; flex-direction:column; gap:4px; }
  .quiz-date{ font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--ink); }
  .quiz-sub{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); letter-spacing:.04em; text-transform:uppercase; }
  .today-tag{
    background:color-mix(in srgb, var(--accent-2) 16%, transparent); color:var(--accent-2);
    font-family:var(--font-mono); font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px;
    text-transform:uppercase; letter-spacing:.06em; margin-left:8px;
  }
  .qi-action-btn{
    border:none; padding:11px 20px; border-radius:10px; font-family:var(--font-body); font-weight:600;
    font-size:13.5px; cursor:pointer; transition:all .2s ease; white-space:nowrap;
  }
  .btn-start{ background:var(--ink); color:var(--paper); }
  .btn-start:hover{ transform:translateY(-2px); box-shadow:0 10px 22px rgba(var(--shadow-c),0.2); }
  .btn-done{ background:transparent; border:1.5px solid var(--good); color:var(--good); }
  .btn-done:hover{ background:color-mix(in srgb, var(--good) 10%, transparent); }
  .done-score{ font-family:var(--font-mono); font-size:12px; color:var(--good); font-weight:600; }
</style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="theme-toggle" role="group" aria-label="Study hour theme">
    <button id="btn-dawn" class="active" onclick="setTheme('dawn')">☀ EARLY RISER</button>
    <button id="btn-dusk" onclick="setTheme('dusk')">☾ NIGHT OWL</button>
  </div>

  <header>
    <div class="eyebrow">IAS IQ · Daily Practice · Sourced from The Hindu</div>
    <h1>Choose a test</h1>
  </header>

  <div class="navbar">
    <span class="brand" id="welcomeName">Loading...</span>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <button onclick="logout()">Log out</button>
    </div>
  </div>

  <main>
    <div id="loadingState" class="state-box">
      <div class="icon">⏳</div><h3>Fetching available tests...</h3>
    </div>

    <div id="emptyState" class="state-box face" style="display:none;">
      <div class="icon">🗓️</div>
      <h3>No tests available yet</h3>
      <p>Nothing has been added to today's set yet. Check back a little later.</p>
    </div>

    <div id="listWrap" style="display:none;">
      <div class="analysis-heading" style="font-family:var(--font-display); font-size:15px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; margin:0 0 14px 4px;">Pick a date to attempt</div>
      <div id="quizList"></div>
    </div>
  </main>

  <footer>New question set drops daily at 6 AM.</footer>

  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    let currentUser = null;

    function setTheme(name){
      if (name === 'dusk') document.body.setAttribute('data-theme', 'dusk');
      else document.body.removeAttribute('data-theme');
      document.getElementById('btn-dawn').classList.toggle('active', name === 'dawn');
      document.getElementById('btn-dusk').classList.toggle('active', name === 'dusk');
      localStorage.setItem('iasiq-theme', name);
    }
    (function(){ const saved = localStorage.getItem('iasiq-theme'); if (saved) setTheme(saved); })();

    async function logout(){ await sb.auth.signOut(); window.location.href = 'index.html'; }

    function fmtDate(d){
      return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    }

    async function init(){
      const { data: { session } } = await sb.auth.getSession();
      if (!session){ window.location.href = 'index.html'; return; }
      currentUser = session.user;
      document.getElementById('welcomeName').textContent = 'Hi, ' + (currentUser.user_metadata?.display_name || currentUser.email);

      const todayStr = new Date().toISOString().slice(0,10);

      // Only ever show tests up to today — no peeking at future dates
      const { data: sets, error: setsErr } = await sb
        .from('questions_daily').select('date')
        .lte('date', todayStr)
        .order('date', { ascending: false })
        .limit(30);

      document.getElementById('loadingState').style.display = 'none';

      if (setsErr || !sets || !sets.length){
        document.getElementById('emptyState').style.display = '';
        return;
      }

      const { data: attempts } = await sb
        .from('attempts').select('date, correct, total')
        .eq('user_id', currentUser.id);

      const attemptMap = {};
      (attempts || []).forEach(a => { attemptMap[a.date] = a; });

      const list = document.getElementById('quizList');
      list.innerHTML = '';
      sets.forEach(({ date }) => {
        const done = attemptMap[date];
        const isToday = date === todayStr;
        const item = document.createElement('div');
        item.className = 'quiz-item';
        item.innerHTML =
          '<div class="qi-left">' +
            '<span class="quiz-date">' + fmtDate(date) + (isToday ? '<span class="today-tag">Today</span>' : '') + '</span>' +
            (done ? '<span class="done-score">Completed — ' + done.correct + ' / ' + done.total + ' correct</span>' : '<span class="quiz-sub">Not attempted yet</span>') +
          '</div>' +
          (done
            ? '<button class="qi-action-btn btn-done" onclick="window.location.href=\'dashboard.html\'">View review</button>'
            : '<button class="qi-action-btn btn-start" onclick="startQuiz(\'' + date + '\')">Start test →</button>');
        list.appendChild(item);
      });

      document.getElementById('listWrap').style.display = '';
    }

    function startQuiz(date){
      window.location.href = 'quiz.html?date=' + encodeURIComponent(date);
    }

    init();
  </script>
</body>
</html>
